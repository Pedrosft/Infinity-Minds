<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#1e8f50">
    <meta name="description" content="Protótipo Infinity Minds">
    <title>Coordenação — Infinity Minds</title>
    <link rel="icon" href="../assets/img/favicon.png">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <main class="auth-page">
        <div class="auth-shell">
            <section class="auth-art">
                <div><span class="eyebrow">Gestão preventiva</span>
                    <h2>Decisões melhores começam com sinais visíveis.</h2>
                    <p>Acompanhe tendências consolidadas, alertas e planos pedagógicos sem expor identidades
                        individuais.</p>
                </div><img src="../assets/img/assistente.png" alt="Assistente Infinity Minds">
            </section>
            <section class="auth-card">
                <div class="auth-brand"><a href="../index.html"><img src="../assets/img/favicon.png"
                            alt="Infinity Minds"></a><a class="back-link" href="acesso.html">← Voltar</a></div>
                <h1>Painel da coordenação</h1>
                <p>Use qualquer dado fictício para abrir a demonstração.</p>
                <form data-demo-form="login" data-target="painel-coordenador.html">
                    <div class="field"><label>E-mail institucional</label><input class="input" type="email"
                            placeholder="coordenacao@escola.edu.br" required></div>
                    <div class="field"><label>Senha</label><input class="input" type="password" placeholder="••••••••"
                            required></div>
                    <div class="field"><label>Unidade escolar</label><select class="select">
                            <option>Colégio Horizonte — Unidade Centro</option>
                            <option>Unidade —  Pedro Lucas Leal</option>
                        </select></div><button class="btn btn-secondary btn-block" type="submit">Acessar painel
                        demonstrativo</button>
                </form>
              
            </section>
        </div>
    </main>
    <button class="libras-fab" data-libras aria-label="Abrir recurso de Libras">🤟</button>
    <div class="modal-backdrop" id="global-modal" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-icon" id="modal-icon">✦</div>
            <h2 id="modal-title">Aviso</h2>
            <p id="modal-text">Conteúdo demonstrativo.</p><button class="btn btn-primary btn-block"
                data-close-modal>Entendi</button>
        </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="../assets/js/app.js"></script>
</body>

</html>
